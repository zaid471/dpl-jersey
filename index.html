<!DOCTYPE html>
<html>
<head>
<title>DPL Jersey Selector</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.grid{
display:grid;
grid-template-columns:repeat(10,60px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.jersey{
background:#2ecc71;
color:white;
padding:15px;
border-radius:8px;
cursor:pointer;
}

.taken{
background:#e74c3c;
cursor:not-allowed;
}

#list{
margin-top:30px;
}
</style>
</head>

<body>

<h1>DPL Jersey Selection</h1>

<div class="grid" id="jerseys"></div>

<h2>Selected Jerseys</h2>
<ul id="list"></ul>

<script>

const API="https://script.google.com/macros/s/AKfycbzHSD9kWDpP_2kJsW5iNn3DpU045aM9xBaar7zK4TzLdWTvbavH1171V2-yX3ige3-jBA/exec";

const grid=document.getElementById("jerseys");
const list=document.getElementById("list");

async function loadData(){

const res=await fetch(API);
const data=await res.json();

grid.innerHTML="";
list.innerHTML="";

for(let i=1;i<data.length;i++){

const number=data[i][0];
const name=data[i][1];

const div=document.createElement("div");
div.className="jersey";
div.innerText=number;

if(name){
div.classList.add("taken");
list.innerHTML+=`<li>${name} — #${number}</li>`;
}

div.onclick=async()=>{

if(name) return;

const player=prompt("Enter your name");

if(!player) return;

await fetch(API,{
method:"POST",
body:JSON.stringify({
number:number,
name:player
})
});

loadData();

};

grid.appendChild(div);

}

}

loadData();

</script>

</body>
</html>
