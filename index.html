<!DOCTYPE html>
<html>

<head>
<title>DPL Jersey Selection</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#0f172a;
color:white;
}

h1{
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(10,80px);
gap:12px;
justify-content:center;
margin-top:30px;
}

.number{
width:80px;
height:80px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#22c55e;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.taken{
background:#ef4444;
cursor:not-allowed;
}

.name{
font-size:12px;
margin-top:4px;
}

table{
margin:auto;
margin-top:40px;
border-collapse:collapse;
width:300px;
background:white;
color:black;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#eee;
}

</style>
</head>

<body>

<h1>DPL Jersey Selection</h1>
<p>Green = Available | Red = Taken</p>

<div class="grid" id="grid"></div>

<h2>Selected Players</h2>

<table>
<tr>
<th>Jersey</th>
<th>Name</th>
</tr>
<tbody id="playerList"></tbody>
</table>

<script>

let grid=document.getElementById("grid")
let playerList=document.getElementById("playerList")

let saved=JSON.parse(localStorage.getItem("jerseyData")) || {}

function updateList(){

playerList.innerHTML=""

for(let num in saved){

let row=document.createElement("tr")

row.innerHTML="<td>"+num+"</td><td>"+saved[num]+"</td>"

playerList.appendChild(row)

}

}

for(let i=1;i<=60;i++){

let box=document.createElement("div")

box.classList.add("number")

if(saved[i]){

box.classList.add("taken")

box.innerHTML=i+"<div class='name'>"+saved[i]+"</div>"

}else{

box.innerHTML=i

}

box.onclick=function(){

if(saved[i]) return

let name=prompt("Enter your name")

if(name){

saved[i]=name

localStorage.setItem("jerseyData",JSON.stringify(saved))

box.classList.add("taken")

box.innerHTML=i+"<div class='name'>"+name+"</div>"

updateList()

}

}

grid.appendChild(box)

}

updateList()

</script>

</body>
</html>
